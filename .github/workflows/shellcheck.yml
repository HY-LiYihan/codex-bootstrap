name: shellcheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax check
        run: bash -n install.sh
      - name: Dry run
        run: CODEX_TOKEN=test-token ./install.sh --local . --dry-run --skip-codex-install --skip-shell-rc --yes
