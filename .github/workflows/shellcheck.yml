name: script-checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          bash -n install.sh
          bash -n install-codex.sh
          bash -n agent
          find agents -name 'install.sh' -print0 | xargs -0 -I{} bash -n {}
          bash -n switch.sh
          node --check shared/codex-provider-sync.js
          node --check switch.js
      - name: Codex stable entrypoint dry run
        run: CODEX_TOKEN=test-token CODEX_API_URL=https://example.test/v1 ./install-codex.sh --local . --dry-run --skip-codex-install --skip-shell-rc --yes
      - name: Codex Node fallback dry run
        run: |
          tmp="$(mktemp -d)"
          PATH="/usr/bin:/bin:/usr/sbin:/sbin" NVM_DIR="$tmp/nvm" CODEX_HOME="$tmp/codex" CODEX_PROJECT_DIR="$tmp/project" CODEX_TOKEN=test-token CODEX_API_URL=https://example.test/v1 ./install-codex.sh --local . --dry-run --no-bun --skip-shell-rc --yes | tee "$tmp/out"
          rg -n 'npm is missing|Installing NVM|nvm/archive|npm install -g @openai/codex' "$tmp/out"
      - name: Codex stable config generation
        run: |
          tmp="$(mktemp -d)"
          CODEX_HOME="$tmp/codex" CODEX_PROJECT_DIR="$tmp/project" CODEX_TOKEN=test-token CODEX_API_URL=https://example.test/v1 ./install-codex.sh --local . --skip-codex-install --skip-shell-rc --yes
          rg -n 'web_search = "live"' "$tmp/codex/config.toml"
          rg -n 'model_verbosity = "medium"' "$tmp/codex/config.toml"
          rg -n 'model_reasoning_summary = "auto"' "$tmp/codex/config.toml"
          rg -n 'project_doc_max_bytes = 65536' "$tmp/codex/config.toml"
          rg -n 'request_max_retries = 4' "$tmp/codex/config.toml"
          rg -n 'stream_max_retries = 5' "$tmp/codex/config.toml"
          rg -n 'stream_idle_timeout_ms = 300000' "$tmp/codex/config.toml"
      - name: Codex config preserves plugin tail
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/codex" "$tmp/project"
          cat > "$tmp/codex/config.toml" <<'TOML'
          model = "old"

          [marketplaces.openai-bundled]
          source_type = "local"
          source = "/tmp/bundled-marketplaces/openai-bundled"

          [plugins."browser-use@openai-bundled"]
          enabled = true
          TOML
          CODEX_HOME="$tmp/codex" CODEX_PROJECT_DIR="$tmp/project" CODEX_TOKEN=test-token CODEX_API_URL=https://example.test/v1 ./install-codex.sh --local . --skip-codex-install --skip-shell-rc --yes
          rg -n 'model = "gpt-5.5"' "$tmp/codex/config.toml"
          rg -n '^\[agents\]' "$tmp/codex/config.toml"
          rg -n 'max_threads = 10' "$tmp/codex/config.toml"
          rg -n '^\[marketplaces.openai-bundled\]' "$tmp/codex/config.toml"
          rg -n 'source = "/tmp/bundled-marketplaces/openai-bundled"' "$tmp/codex/config.toml"
          rg -n '^\[plugins\."browser-use@openai-bundled"\]' "$tmp/codex/config.toml"
      - name: Codex dispatcher dry run
        run: AGENT=codex AGENT_TOKEN=test-token AGENT_BASE_URL=https://example.test/v1 ./install.sh --local . --dry-run --skip-codex-install --skip-shell-rc --yes
      - name: Codex dispatcher no-extra-args dry run
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/agents/codex"
          printf '#!/usr/bin/env bash\nset -euo pipefail\necho "stub codex installer: $*"\n' > "$tmp/agents/codex/install.sh"
          chmod +x "$tmp/agents/codex/install.sh"
          AGENT=codex AGENT_TOKEN=test-token AGENT_BASE_URL=https://example.test/v1 ./install.sh --local "$tmp"
      - name: Codex safe profile dry run
        run: CODEX_SECURITY_PROFILE=safe AGENT=codex AGENT_TOKEN=test-token AGENT_BASE_URL=https://example.test/v1 ./install.sh --local . --dry-run --skip-codex-install --skip-shell-rc --yes
      - name: Default agent entrypoint dry run
        run: AGENT_TOKEN=test-token AGENT_BASE_URL=https://example.test/v1 AGENT_BOOTSTRAP_LOCAL_SOURCE=. AGENT_BOOTSTRAP_INSTALL_ARGS='--dry-run --skip-codex-install --skip-shell-rc --yes' bash -c '. ./agent'
      - name: Claude Code dispatcher dry run
        run: AGENT=claudecode AGENT_TOKEN=test-token AGENT_BASE_URL=https://example.test/anthropic ./install.sh --local . --dry-run --skip-claude-install
      - name: OpenClaw dispatcher dry run
        run: AGENT=openclaw AGENT_TOKEN=test-token AGENT_BASE_URL=https://example.test/anthropic ./install.sh --local . --dry-run
      - name: Codex++ dispatcher dry run
        run: AGENT=codexplusplus ./install.sh --local . --dry-run --skip-setup --provider-sync
      - name: Agent switch dry run
        run: |
          export AGENT_BOOTSTRAP_HOME="$(mktemp -d)"
          node switch.js add test --token test-token --base-url https://example.test/api
          node switch.js list
          node switch.js use test --dry-run
          node switch.js shell-hook
      - name: Codex provider history sync test
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/sessions/2026/05/14"
          cat > "$tmp/config.toml" <<'TOML'
          model_provider = "custom"
          TOML
          rollout="$tmp/sessions/2026/05/14/rollout-test.jsonl"
          printf '%s\n%s\n' '{"type":"session_meta","payload":{"model_provider":"sss","id":"abc"}}' '{"type":"user_message","payload":{"text":"keep me"}}' > "$rollout"
          sqlite3 "$tmp/state_5.sqlite" 'CREATE TABLE threads (id TEXT PRIMARY KEY, model_provider TEXT); INSERT INTO threads VALUES ("t1", "sss");'
          node shared/codex-provider-sync.js --codex-home "$tmp"
          node - "$rollout" <<'NODE'
          const fs = require('node:fs');
          const lines = fs.readFileSync(process.argv[2], 'utf8').split('\n');
          const first = JSON.parse(lines[0]);
          if (first.payload.model_provider !== 'custom') throw new Error('rollout provider was not synced');
          if (lines[1] !== '{"type":"user_message","payload":{"text":"keep me"}}') throw new Error('non-metadata rollout line changed');
          NODE
          test "$(sqlite3 "$tmp/state_5.sqlite" 'SELECT model_provider FROM threads WHERE id="t1";')" = custom
          test -d "$tmp/backups_state/provider-sync"

  windows-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $errorsFound = $false
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "Syntax errors in $($_.FullName)"
              $errors | Format-List | Out-String | Write-Host
              $errorsFound = $true
            }
          }
          if ($errorsFound) { exit 1 }
      - name: Interactive entrypoint smoke check
        shell: pwsh
        run: |
          if (-not (Test-Path .\agent.ps1)) { exit 1 }
      - name: Codex PowerShell dry run
        shell: pwsh
        run: |
          $env:CODEX_TOKEN = 'test-token'
          $env:CODEX_API_URL = 'https://example.test/v1'
          $env:CODEX_SECURITY_PROFILE = 'safe'
          .\agents\codex\install.ps1 -LocalSource . -DryRun -SkipCodexInstall -SkipProfileUpdate
      - name: Claude Code PowerShell dry run
        shell: pwsh
        run: |
          $env:CLAUDE_CLIENT_TOKEN = 'test-token'
          $env:CLAUDE_API_URL = 'https://example.test/anthropic'
          .\agents\claudecode\install.ps1 -DryRun -SkipInstall
      - name: OpenClaw PowerShell dry run
        shell: pwsh
        run: |
          $env:OPENCLAW_TOKEN = 'test-token'
          $env:OPENCLAW_BASE_URL = 'https://example.test/anthropic'
          .\agents\openclaw\install.ps1 -DryRun
      - name: Codex++ PowerShell dry run
        shell: pwsh
        run: .\agents\codexplusplus\install.ps1 -DryRun -SkipSetup -ProviderSync 1
      - name: Agent switch PowerShell wrapper syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\switch.ps1).Path, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors | Format-List | Out-String | Write-Host; exit 1 }
